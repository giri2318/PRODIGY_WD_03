<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe 3D</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="master.css" />
</head>
<body>

  <h1 class="header">TIC TAC TOE</h1>

  <!-- ══ SETUP SCREEN ══ -->
  <div class="setup-screen" id="setupScreen">
    <h2>New Game</h2>

    <div class="mode-selector">
      <button class="mode-btn active" data-mode="pvp">👥 2 Players</button>
      <button class="mode-btn" data-mode="ai">🤖 vs AI</button>
    </div>

    <div class="difficulty-row" id="diffRow">
      <button class="diff-btn easy active" data-diff="easy">Easy</button>
      <button class="diff-btn hard" data-diff="hard">Hard</button>
      <button class="diff-btn unbeatable" data-diff="unbeatable">Unbeatable</button>
    </div>

    <div class="player-row">
      <div class="player-field x-field">
        <label for="p1name">Player 1 · X</label>
        <input type="text" id="p1name" class="input-field" placeholder="Enter name" maxlength="14" autocomplete="off" />
      </div>
      <div class="player-field o-field" id="p2field">
        <label for="p2name">Player 2 · O</label>
        <input type="text" id="p2name" class="input-field" placeholder="Enter name" maxlength="14" autocomplete="off" />
      </div>
    </div>

    <button class="start-btn" id="startBtn">START GAME</button>
  </div>

  <!-- ══ GAME SCREEN ══ -->
  <div class="game-screen hide" id="gameScreen">

    <div class="status-bar">
      <div class="status-turn" id="statusTurn"></div>
      <div class="ai-thinking" id="aiThinking">AI is thinking…</div>
    </div>

    <div class="score-board">
      <div class="score-card active-x" id="scoreX">
        <div class="score-label x">X</div>
        <div class="score-name" id="nameX">Player 1</div>
        <div class="score-num x" id="numX">0</div>
      </div>
      <div class="score-card" id="scoreTie">
        <div class="score-label tie">TIES</div>
        <div class="score-name">Draws</div>
        <div class="score-num tie" id="numTie">0</div>
      </div>
      <div class="score-card" id="scoreO">
        <div class="score-label o">O</div>
        <div class="score-name" id="nameO">Player 2</div>
        <div class="score-num o" id="numO">0</div>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board-outer">
        <div class="board-grid" id="boardGrid"></div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="menuBtn">⬅ Menu</button>
      <button class="ctrl-btn primary" id="resetBtn">↺ New Round</button>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
